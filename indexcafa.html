      <div class="card cp" style="margin-bottom:24px">
         <div class="ir c2">
            <div>
              <label class="fl">1. Select Instructor Filter</label>
              <select class="inp" id="iSel" style="font-weight:600">
                 <option value="">-- All / Filter by Instructor --</option>
                 ${instructors.map(i => `<option value="${esc(i.uid)}">${esc(i.full_name)}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="fl">2. Select Student</label>
              <select class="inp" id="rSel" style="font-weight:600" disabled>
                 <option value="">-- Select Student --</option>
              </select>
            </div>
         </div>
      </div>
      
      <div id="recTableContainer"></div>
    </div>`;

        document.getElementById('iSel').onchange = e => {
          selInst = e.target.value;
          selUid = '';
          if (recUnsub) { recUnsub(); recUnsub = null; }
          document.getElementById('recTableContainer').innerHTML = '';

          const rSel = document.getElementById('rSel');
          if (selInst) {
            rSel.innerHTML = `<option value="">Loading students...</option>`;
            rSel.disabled = true;

            db.collection('academic_records').where('instructor_uid', '==', selInst).get().then(recSnap => {
              const stuIds = new Set();
              recSnap.forEach(d => {
                if (d.data().isDeleted !== true && d.data().student_uid) {
                  stuIds.add(d.data().student_uid);
                }
              });

              if (stuIds.size === 0) {
                rSel.innerHTML = `<option value="">-- No students assigned --</option>`;
                return;
              }

              db.collection('users').where('role', '==', 'student').get().then(snap => {
                students = [];
                snap.forEach(d => {
                  const s = d.data();
                  if (s.isDeleted !== true && stuIds.has(s.uid)) {
                    students.push({ ...s, _id: d.id });
                  }
                });
                students.sort((a, b) => (a.full_name || '').localeCompare(b.full_name || ''));
                rSel.innerHTML = `<option value="">-- Select Student --</option>` + students.map(s => `<option value="${esc(s.uid)}">${esc(s.full_name)} (${esc(s.id_number)})</option>`).join('');
                rSel.disabled = false;
              });
            }).catch(err => {
              rSel.innerHTML = `<option value="">Error loading data</option>`;
            });
          } else {
            rSel.innerHTML = `<option value="">-- Select Student --</option>`;
            rSel.disabled = true;
          }
        };

        document.getElementById('rSel').onchange = e => {
          selUid = e.target.value;
          if (selUid) loadRecs();
          else { if (recUnsub) { recUnsub(); recUnsub = null; } document.getElementById('recTableContainer').innerHTML = ''; }
        };
      }

      function loadRecs() {
        if (recUnsub) { recUnsub(); recUnsub = null; }
        if (!selUid) return;
        recUnsub = db.collection('academic_records').where('student_uid', '==', selUid).onSnapshot(snap => {
          const recs = {};
          snap.forEach(d => { const x = d.data(); if (x.isDeleted === false) recs[x.course_code] = { ...x, _id: d.id }; });
          renderTable(recs, students.find(s => s.uid === selUid));
        }, () => { });
        LISTENERS.add(recUnsub);
      }

      function renderTable(recs, stu) {
        const container = document.getElementById('recTableContainer');
        if (!container) return;

        container.innerHTML = `
        <div class="cs">
          <div class="tw"><table>
              <thead><tr>${['Course', 'Grade', 'Status', 'Sealed', 'Action'].map(h => `<th>${h}</th>`).join('')}</tr></thead>
              <tbody>${Object.entries(recs).map(([code, rec]) => `<tr>
                <td style="font-family:monospace;font-weight:700;color:var(--sage)">${esc(code)}</td>
                <td style="font-family:monospace;font-weight:700;font-size:15px;color:${gc(rec.status)}">${rec.final_grade || '—'}</td>
                <td>${bdg(rec.status)}</td>
                <td>${lkH(rec.isLocked)}</td>
                <td>
                   ${rec.isLocked ?
            `<button class="btn bam bsm ovB" style="border-radius:8px" data-code="${esc(code)}" data-rid="${esc(rec._id)}">${isPastDeadline ? `<span style="display:flex;gap:4px;align-items:center">${ICONS.camera} QR Unlock</span>` : `<span style="display:flex;gap:4px;align-items:center">${ICONS.unlock} Unlock</span>`}</button>`
            : (S.doc.role === 'admin' ? `<button class="btn bo bsm lkB" style="border-radius:8px" data-code="${esc(code)}" data-rid="${esc(rec._id)}"><span style="display:flex;gap:4px;align-items:center">${ICONS.lock} Re-Lock</span></button>` : `<span style="font-size:12px;color:var(--saged);font-weight:700">Editable</span>`)}
                </td>
              </tr>`).join('')}</tbody>
            </table></div>
        </div>`;

        if (S.doc.role === 'admin') {
          container.querySelectorAll('.lkB').forEach(b => b.onclick = async () => {
            try { await db.collection('academic_records').doc(b.dataset.rid).update({ isLocked: true }); toast(`${b.dataset.code} re-locked.`, 'success'); } catch (e) { }
          });
        }

        container.querySelectorAll('.ovB').forEach(b => b.onclick = () => {
          const code = b.dataset.code, rid = b.dataset.rid;

          if (isPastDeadline) {
            modal({
              title: `QR Override Authentication`, sub: `Scan the Official Dean's QR Code using your camera.`, accent: '#7c4fba',
              body: `
            <div id="qr-reader" style="width:100%; max-width:400px; margin:auto; border-radius:12px; overflow:hidden; border:2px solid var(--bd)"></div>
            <div style="text-align:center; margin:14px 0; color:var(--ink4); font-size:12px; font-weight:bold;">— OR ENTER MANUALLY —</div>
            <div class="ig"><input class="inp" id="ovQR" type="password" placeholder="Manual Key Override" style="font-family:monospace;letter-spacing:0.2em;text-align:center;font-size:18px;padding:14px"/></div>
          `,
              btns: [{
                label: 'Decrypt & Unlock', cls: 'bn', fn: async () => {
                  const ovQR = document.getElementById('ovQR');
                  const key = (ovQR ? ovQR.value : '').trim();
                  if (key !== QR_SECRET_KEY) { toast('ACCESS DENIED: Invalid QR Key.', 'error'); return; }
                  closeModal();
                  try {
                    await db.collection('academic_records').doc(rid).update({ isLocked: false, lastUpdated: firebase.firestore.FieldValue.serverTimestamp(), overrideLog: firebase.firestore.FieldValue.arrayUnion({ adminUid: S.user.uid, adminName: S.doc.full_name, timestamp: new Date().toISOString(), reason: 'QR DECRYPTION OVERRIDE AFTER DEADLINE', action: 'UNLOCK' }) });
                    toast(`QR Accepted: ${code} unlocked.`, 'success');
                  } catch (e) { toast(e.message, 'error'); }
                }
              }, { label: 'Cancel', cls: 'bo', fn: closeModal }]
            });

            setTimeout(() => {
              if (document.getElementById('qr-reader')) {
                window.html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
                window.html5QrcodeScanner.render((decodedText) => {
                  if (decodedText === QR_SECRET_KEY) {
                    window.html5QrcodeScanner.clear().catch(e => { });
                    document.getElementById('ovQR').value = decodedText;
                    toast('QR Code Scanned Successfully!', 'success');
                  }
                }, (errorMessage) => { });
              }
            }, 300);

          } else {
            modal({
              title: `Apply Override: ${esc(code)}`, sub: `Unlock for ${esc(stu ? stu.full_name : '')}. Permanently logged.`, accent: '#c98a38',
              body: `<div class="ig"><label class="fl">Override Justification <span style="color:var(--rose)">*</span></label><textarea class="inp" id="ovR" placeholder="Reason for unlocking..."></textarea></div>`,
              btns: [{
                label: 'Apply Override', cls: 'bam', fn: async () => {
                  const ovR = document.getElementById('ovR');
                  const reason = (ovR ? ovR.value : '').trim();
                  if (!reason) { toast('Justification required.', 'error'); return; }
                  closeModal();
                  try {
                    await db.collection('academic_records').doc(rid).update({ isLocked: false, lastUpdated: firebase.firestore.FieldValue.serverTimestamp(), overrideLog: firebase.firestore.FieldValue.arrayUnion({ adminUid: S.user.uid, adminName: S.doc.full_name, timestamp: new Date().toISOString(), reason, action: 'UNLOCK' }) });
                    toast(`${code} unlocked `, 'warning');
                  } catch (e) { toast(e.message, 'error'); }
                }
              }, { label: 'Cancel', cls: 'bo', fn: closeModal }]
            });
          }
        });
      }
    }

    // ═══════════════════════════════════════════════════════════
    //  ADMIN / DEAN — ANALYTICS (WITH CHART.JS)
    // ═══════════════════════════════════════════════════════════
    function pgAnalytics(C) {
      analyticsCharts.forEach(c => { try { c.destroy(); } catch (e) { } });
      analyticsCharts = [];

      const unsub = db.collection('academic_records').where('isDeleted', '==', false).onSnapshot(async rSnap => {
        const recs = []; rSnap.forEach(d => recs.push(d.data()));
        let csPassed = 0; let csFail = 0; let csInc = 0;
        const cs = recs.reduce((a, r) => {
          if (!a[r.course_code]) a[r.course_code] = { passed: 0, blocking: 0, total: 0 };
          a[r.course_code].total++;
          if (r.status === 'Passed') { a[r.course_code].passed++; csPassed++; }
          else if (r.status === 'Failed') { csFail++; }
          else if (['INC', 'NFE', 'DRP'].includes(r.status)) { csInc++; }

          if (BLOCKING.has(r.status)) a[r.course_code].blocking++;
          return a;
        }, {});

        const totalG = recs.length || 1;
        const prRate = Math.round((csPassed / totalG) * 100);

        C.innerHTML = `<div class="pg up">
        <div class="ph"><span class="stg">Analytics</span><div class="pt">Performance Statistics</div></div>
        <div class="sg">
          <div class="sc"><div class="sl">Global Pass Rate</div><div class="sv" style="color:var(--sage)">${prRate}%</div></div>
          <div class="sc"><div class="sl">Total Records</div><div class="sv">${recs.length}</div></div>
          <div class="sc"><div class="sl">Bottlenecks</div><div class="sv" style="color:var(--rose)">${Object.values(cs).filter(s => s.blocking > 0).length}</div></div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;margin-bottom:24px">
           <div class="card cp">
              <h3 style="font-family:var(--fd);font-size:18px;font-weight:600;margin-bottom:16px">Global Grade Distribution</h3>
              <div class="chart-container"><canvas id="distChart"></canvas></div>
           </div>
           <div class="card cp">
              <h3 style="font-family:var(--fd);font-size:18px;font-weight:600;margin-bottom:16px">Top Bottleneck Subjects</h3>
              <div class="chart-container"><canvas id="bottleneckChart"></canvas></div>
           </div>
        </div>
      </div>`;

        setTimeout(() => {
          const ctxDist = document.getElementById('distChart');
          const ctxBottle = document.getElementById('bottleneckChart');

          const rootStyles = getComputedStyle(document.documentElement);
          const sage = rootStyles.getPropertyValue('--sage').trim() || '#7a9e87';
          const rose = rootStyles.getPropertyValue('--rose').trim() || '#c05e6a';
          const amber = rootStyles.getPropertyValue('--amber').trim() || '#c98a38';
          const textColor = rootStyles.getPropertyValue('--ink2').trim() || '#574f45';

          if (ctxDist) {
            analyticsCharts.push(new Chart(ctxDist, {
              type: 'doughnut',
              data: {
                labels: ['Passed', 'INC/NFE/DRP', 'Failed'],
                datasets: [{
                  data: [csPassed, csInc, csFail],
                  backgroundColor: [sage, amber, rose],
                  borderWidth: 0
                }]
              },
              options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: textColor } } } }
            }));
          }

          if (ctxBottle) {
            const botData = Object.entries(cs).map(([k, v]) => ({ subject: k, blocks: v.blocking })).sort((a, b) => b.blocks - a.blocks).slice(0, 5);
            analyticsCharts.push(new Chart(ctxBottle, {
              type: 'bar',
              data: {
                labels: botData.map(b => b.subject),
                datasets: [{
                  label: 'Fails / INC / Blocks',
                  data: botData.map(b => b.blocks),
                  backgroundColor: rose,
                  borderRadius: 4
                }]
              },
              options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { precision: 0, color: textColor } }, x: { ticks: { color: textColor } } }, plugins: { legend: { display: false } } }
            }));
          }
        }, 100);

      }, () => { });
      LISTENERS.add(unsub);
    }

    // ═══════════════════════════════════════════════════════════
    //  STUDENT — ADD / DROP & PETITIONS
    // ═══════════════════════════════════════════════════════════
    function pgAddDrop(C) {
      if (S.doc.role !== 'student') return;
      let petitions = [];
      let dropRequests = [];
      let enrolledRecords = [];

      const p1 = db.collection('petitions').onSnapshot(snap => {
        petitions = []; snap.forEach(d => petitions.push({ ...d.data(), _id: d.id }));
        render();
      }, () => { });
      const p2 = db.collection('drop_requests').where('student_uid', '==', S.user.uid).onSnapshot(snap => {
        dropRequests = []; snap.forEach(d => dropRequests.push({ ...d.data(), _id: d.id }));
        render();
      }, () => { });
      const p3 = db.collection('academic_records').where('student_uid', '==', S.user.uid).onSnapshot(snap => {
        enrolledRecords = []; snap.forEach(d => enrolledRecords.push({ ...d.data(), _id: d.id }));
        render();
      }, () => { });
      LISTENERS.add(p1); LISTENERS.add(p2); LISTENERS.add(p3);

      function render() {
        const sCur = Object.values(CURRICULUM_DB).filter(c => c.program === S.doc.program && c.curriculum_version === S.doc.curriculum_version);
        const cY = S.doc.year_level || 1, cT = S.doc.current_term || 1;

        const passedOrActive = new Set();
        enrolledRecords.forEach(r => {
          if (r.status !== 'Failed' && r.status !== 'DRP' && !r.isDeleted) passedOrActive.add(r.course_code);
        });

        const backSubjects = [];
        sCur.forEach(c => {
          if (!passedOrActive.has(c.course_code)) {
            const prevRec = enrolledRecords.find(r => r.course_code === c.course_code && (r.status === 'Failed' || r.status === 'DRP') && !r.isDeleted);
            if (prevRec || (Number(c.year_level) < Number(cY) || (Number(c.year_level) === Number(cY) && Number(c.term) < Number(cT)))) {
              backSubjects.push(c);
            }
          }
        });

        const currentClasses = enrolledRecords.filter(r => !r.isDeleted && r.status === 'Pending' && !r.isLocked && r.term_enrolled === `${new Date().getFullYear()}-${new Date().getFullYear() + 1}-T${S.config.term || 1}`);

        C.innerHTML = `<div class="pg up">
            <div class="ph"><span class="stg">Student Portal</span><div class="pt">Add/Drop & Petitions</div></div>
            
            <div class="card cp" style="margin-bottom:24px;border-color:var(--amber)">
               <span class="stg" style="background:var(--amberbg);color:var(--amber)">Petition for Subjects</span>
               <div class="sti" style="margin-bottom:12px">Join or Create Petitions for Back Subjects</div>
               ${backSubjects.length === 0 ? `<div class="ib ibsg"><span>${ICONS.check}</span><div>You have no back subjects or missing previous subjects. Petitions are unavailable.</div></div>`
            : `<div class="tw"><table>
                  <thead><tr><th>Subject Code</th><th>Title</th><th>Active Petition</th><th>Action</th></tr></thead>
                  <tbody>${backSubjects.map(bs => {
              const activeP = petitions.find(p => p.subject_code === bs.course_code && p.status === 'pending');
              const haveJoined = activeP && activeP.students.includes(S.user.uid);
              return `<tr>
                        <td style="font-family:monospace;font-weight:700;color:var(--amber)">${esc(bs.course_code)}</td>
                        <td style="font-size:13px">${esc(bs.descriptive_title)}</td>
                        <td style="font-size:12px">${activeP ? `Yes (${activeP.students.length} joined)` : '<span style="color:var(--ink4)">None</span>'}</td>
                        <td>
                           ${haveJoined ? `<span class="bdg bsg">Joined</span>` :
                  activeP ? `<button class="btn bo bxs joinPBtn" data-pid="${activeP._id}">Join Petition</button>` :
                    `<button class="btn bp bxs createPBtn" data-scode="${bs.course_code}">Start Petition</button>`}
                        </td>
                     </tr>`;
            }).join('')}</tbody>
               </table></div>`}
            </div>

            <div class="card cp" style="border-color:var(--rose)">
               <span class="stg" style="background:#fff1f2;color:var(--rose)">Drop Requests</span>
               <div class="sti" style="margin-bottom:12px">Current term classes that can be dropped</div>
               ${currentClasses.length === 0 ? `<div class="emp"><div style="color:var(--ink4);display:flex;justify-content:center">${ICONS.info}</div><div style="font-size:14px;color:var(--ink3);text-align:center;margin-top:8px">No active pending classes to drop either due to no pending subjects or missing configuration.</div></div>`
            : `<div class="tw"><table>
                  <thead><tr><th>Subject</th><th>Section</th><th>Drop Status</th><th>Action</th></tr></thead>
                  <tbody>${currentClasses.map(cc => {
              const dReq = dropRequests.find(dr => dr.record_id === cc._id && dr.status === 'pending');
              return `<tr>
                         <td style="font-family:monospace;font-weight:700">${esc(cc.course_code)}</td>
                         <td style="font-size:12px">${esc(cc.section || 'Unassigned')}</td>
                         <td>${dReq ? '<span class="bdg bi">Drop Requested</span>' : '<span style="color:var(--ink4)">-</span>'}</td>
                         <td>${!dReq ? `<button class="btn bda bxs dropBtn" data-rid="${cc._id}" data-scode="${cc.course_code}">Request Drop</button>` : ''}</td>
                      </tr>`;
            }).join('')}</tbody>
               </table></div>`}
            </div>
         </div>`;

        C.querySelectorAll('.createPBtn').forEach(b => {
          b.onclick = async () => {
            const scode = b.dataset.scode;
            if (!confirm(`Start a petition for ${scode}?`)) return;
            try {
              await db.collection('petitions').add({ subject_code: scode, program: S.doc.program, curriculum_version: S.doc.curriculum_version, students: [S.user.uid], status: 'pending', created_at: Date.now() });
              toast(`Petition for ${scode} created!`, 'success');
            } catch (e) { toast(e.message, 'error'); }
          };
        });
        C.querySelectorAll('.joinPBtn').forEach(b => {
          b.onclick = async () => {
            const pid = b.dataset.pid;
            try {
              const pDocRef = db.collection('petitions').doc(pid);
              const snap = await pDocRef.get();
              if (snap.exists) {
                const data = snap.data();
                data.students.push(S.user.uid);
                await pDocRef.update({ students: data.students });
              }
              toast(`Joined petition!`, 'success');
            } catch (e) { toast(e.message, 'error'); }
          };
        });
        C.querySelectorAll('.dropBtn').forEach(b => {
          b.onclick = async () => {
            const rid = b.dataset.rid;
            const scode = b.dataset.scode;
            if (!confirm(`Submit a formal drop request for ${scode}? This must be approved by the Admin/Dean.`)) return;
            try {
              await db.collection('drop_requests').add({ student_uid: S.user.uid, student_name: S.doc.full_name, student_id: S.doc.id_number, record_id: rid, course_code: scode, status: 'pending', created_at: Date.now() });
              toast('Drop request submitted.', 'success');
            } catch (e) { toast(e.message, 'error'); }
          };
        });
      }
    }

    // ═══════════════════════════════════════════════════════════
    //  ADMIN / DEAN — PETITIONS & ADD/DROP MANAGEMENT
    // ═══════════════════════════════════════════════════════════
    function pgPetitionsAdmin(C) {
      if (S.doc.role !== 'admin' && S.doc.role !== 'dean') return;
      let petitions = [];
      let dropRequests = [];
      let minThreshold = S.config.petitionLimit || 15;

      const p1 = db.collection('petitions').where('status', '==', 'pending').onSnapshot(snap => {
        petitions = []; snap.forEach(d => petitions.push({ ...d.data(), _id: d.id }));
        render();
      }, () => { });
      const p2 = db.collection('drop_requests').where('status', '==', 'pending').onSnapshot(snap => {
        dropRequests = []; snap.forEach(d => dropRequests.push({ ...d.data(), _id: d.id }));
        render();
      }, () => { });
      LISTENERS.add(p1); LISTENERS.add(p2);

      async function approveDrop(dr) {
        if (!confirm(`Approve drop for ${dr.student_name} (${dr.course_code})?`)) return;
        try {
          const batch = db.batch();
          batch.update(db.collection('academic_records').doc(dr.record_id), { status: 'DRP', isLocked: true });
          batch.update(db.collection('drop_requests').doc(dr._id), { status: 'approved' });
          await batch.commit();
          toast('Drop approved.', 'success');
        } catch (e) { toast(e.message, 'error'); }
      }

      function render() {
        C.innerHTML = `<div class="pg up">
            <div class="ph"><span class="stg">HQ Portal</span><div class="pt">Petitions & Requests</div></div>
            
            <div class="card cp" style="margin-bottom:24px;border-color:var(--amber)">
               <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                  <div>
                    <span class="stg" style="background:var(--amberbg);color:var(--amber)">Active Petitions</span>
                    <div class="sti">Subject Re-opening Petitions</div>
                  </div>
                  <div style="display:flex;align-items:center;gap:8px">
                    <label style="font-size:12px;font-weight:600;color:var(--ink3)">Petition Minimum Threshold:</label>
                    <input type="number" id="ptLimitInp" value="${minThreshold}" class="inp" style="width:70px;padding:6px;text-align:center" />
                    <button class="btn bo bxs" id="ptLimitBtn">Save</button>
                  </div>
               </div>
               
               ${petitions.length === 0 ? `<div class="emp"><div style="color:var(--ink4);display:flex;justify-content:center">${ICONS.info}</div><div style="font-size:14px;color:var(--ink3);text-align:center;margin-top:8px">No pending petitions.</div></div>`
            : `<div class="tw"><table>
                  <thead><tr><th>Subject</th><th>Program</th><th>Student Count</th><th>Threshold Met</th><th>Action</th></tr></thead>
                  <tbody>${petitions.map(p => {
              const met = p.students.length >= minThreshold;
              return `<tr>
                         <td style="font-weight:700;font-family:monospace">${esc(p.subject_code)}</td>
                         <td style="font-size:12px">${esc(p.program)}</td>
                         <td style="font-weight:700">${p.students.length}</td>
                         <td>${met ? '<span class="bdg bpd">Yes</span>' : '<span class="bdg bfl">No</span>'}</td>
                         <td><button class="btn bp bxs procPtnBtn" data-pid="${p._id}" >Process</button></td>
                      </tr>`;
            }).join('')}</tbody>
               </table></div>`}
            </div>

            <div class="card cp" style="border-color:var(--rose)">
               <span class="stg" style="background:#fff1f2;color:var(--rose)">Pending Drop Requests</span>
               <div class="sti" style="margin-bottom:12px">Evaluate and approve drops (Schedule Conflict Resolution)</div>
               ${dropRequests.length === 0 ? `<div class="emp"><div style="color:var(--ink4);display:flex;justify-content:center">${ICONS.info}</div><div style="font-size:14px;color:var(--ink3);text-align:center;margin-top:8px">No drop requests.</div></div>`
            : `<div class="tw"><table>
                  <thead><tr><th>Student</th><th>Subject</th><th>Action</th></tr></thead>
                  <tbody>${dropRequests.map(dr => `<tr>
                         <td style="font-weight:700;font-size:13px">${esc(dr.student_name)}</td>
                         <td style="font-family:monospace;font-weight:700">${esc(dr.course_code)}</td>
                         <td><button class="btn bda bxs aprvDrpBtn" data-drid="${dr._id}">Approve Drop</button></td>
                      </tr>`).join('')}</tbody>
               </table></div>`}
            </div>
         </div>`;

        const ptLimitBtn = document.getElementById('ptLimitBtn');
        if (ptLimitBtn) {
          ptLimitBtn.onclick = async () => {
            const val = parseInt(document.getElementById('ptLimitInp').value);
            if (val > 0) {
              await db.collection('config').doc('global').set({ petitionLimit: val }, { merge: true });
              S.config.petitionLimit = val;
              toast('Threshold updated.', 'success');
              minThreshold = val;
              render();
            }
          };
        }

        C.querySelectorAll('.aprvDrpBtn').forEach(b => b.onclick = () => {
          const dr = dropRequests.find(d => d._id === b.dataset.drid);
          if (dr) approveDrop(dr);
        });

        C.querySelectorAll('.procPtnBtn').forEach(b => b.onclick = async () => {
          const ptn = petitions.find(p => p._id === b.dataset.pid);
          if (!ptn) return;
          const facSnap = await db.collection('users').where('role', '==', 'instructor').where('isDeleted', '==', false).get();
          let facText = '<option value="">-- Select Instructor --</option>';
          facSnap.forEach(d => { const u = d.data(); facText += `<option value="${u.uid}">${esc(u.full_name)}</option>`; });

          modal({
            title: 'Review Petition & Open Class',
            sub: `Approve petition for ${ptn.subject_code}. Supply the necessary ingredients.`,
            raw: `
                   <div style="margin-bottom:12px">
                     <label class="fl">Instructor</label>
                     <select id="pInst" class="inp" style="width:100%">${facText}</select>
                   </div>
                   <div style="margin-bottom:12px;display:flex;gap:12px;">
                     <div style="flex:1"><label class="fl">Room</label><input type="text" id="pRoom" class="inp" placeholder="e.g. S603"/></div>
                     <div style="flex:1"><label class="fl">Schedule Days</label><input type="text" id="pDay" class="inp" placeholder="e.g. MON-WED-FRI"/></div>
                     <div style="flex:1"><label class="fl">Time</label><input type="text" id="pTime" class="inp" placeholder="07:00-09:00"/></div>
                   </div>
                   <div class="ib ibam" style="font-size:12px;"><span>${ICONS.alert}</span><div>Approving this creates the class and auto-enrolls ${ptn.students.length} students.</div></div>
                `,
            btns: [
              {
                label: 'Approve & Open Class', cls: 'bp', fn: async () => {
                  const iUid = document.getElementById('pInst').value;
                  const room = document.getElementById('pRoom').value.trim();
                  const day = document.getElementById('pDay').value.trim();
                  const time = document.getElementById('pTime').value.trim();
                  if (!iUid || !room || !day || !time) { toast('Please fill all ingredients.', 'error'); return; }

                  const instSelect = document.getElementById('pInst');
                  const instName = instSelect.options[instSelect.selectedIndex].text;

                  closeModal();
                  try {
                    const cRef = await db.collection('classes').add({
                      instructor_uid: iUid, instructor_name: instName, subject_code: ptn.subject_code, section: 'PETITION-1', program: ptn.program,
                      schedule_day: day, schedule_time: time, schedule_room: room, created_at: Date.now()
                    });

                    const termStr = `${new Date().getFullYear()}-${new Date().getFullYear() + 1}-T${S.config.term || 1}`;
                    const batchSize = 100;
                    let batches = [];
                    let currentBatch = db.batch();
                    let count = 0;

                    for (let i = 0; i < ptn.students.length; i++) {
                      const stuUid = ptn.students[i];
                      const stuDoc = await db.collection('users').doc(stuUid).get();
                      const sdat = stuDoc.data();
                      if (!sdat) continue;
                      const newRecRef = db.collection('academic_records').doc();
                      currentBatch.set(newRecRef, {
                        student_uid: stuUid, student_name: sdat.full_name, student_id: sdat.id_number,
                        course_code: ptn.subject_code, term_enrolled: termStr, instructor_uid: iUid, class_id: cRef.id, section: 'PETITION-1',
                        raw_grade: null, final_grade: null, status: 'Pending', isLocked: false, isDeleted: false, lastUpdated: firebase.firestore.FieldValue.serverTimestamp(), overrideLog: []
                      });
                      count++;
                      if (count % batchSize === 0) { batches.push(currentBatch); currentBatch = db.batch(); }
                    }

                    currentBatch.update(db.collection('petitions').doc(ptn._id), { status: 'approved', class_id: cRef.id });
                    batches.push(currentBatch);
                    for (const b of batches) await b.commit();

                    toast(`Petition approved! Class created and ${count} students enrolled. Instruct students to check schedules and drop conflicts.`, 'success', 6000);
                  } catch (e) { toast(e.message, 'error'); }
                }
              },
              { label: 'Cancel', cls: 'bo', fn: closeModal }
            ]
          });
        });
      }
    }

    // ═══════════════════════════════════════════════════════════
    //  ADMIN — DEV TOOLS & BACKUP
    // ═══════════════════════════════════════════════════════════
    function pgDev(C) {
      C.innerHTML = `<div class="pg up">
    <div class="ph"><span class="stg">Developer</span><div class="pt">Dev Tools &amp; Security</div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px">
      
      <div class="card cp"><div class="sti" style="margin-bottom:16px">Curriculum Seed</div><button class="btn bp bsm" id="seedBtn2" style="border-radius:10px;padding:12px"> Seed Curriculum</button></div>
      
      <div class="card cp">
        <div class="sti" style="margin-bottom:10px;color:var(--plum)">QR Key Generator</div>
        <div style="font-size:13px;color:var(--ink3);margin-bottom:18px;line-height:1.75">Generate the printable QR Decryption Card for overriding grades after the deadline.</div>
        <button class="btn bn bsm" id="genQrBtn" style="border-radius:10px;padding:12px"><span style="display:flex;align-items:center;gap:6px">${ICONS.camera} Print Official QR Card</span></button>
      </div>
      
      <div class="card cp">
        <div class="sti" style="margin-bottom:10px;color:var(--blue)">Firebase Console</div>
        <div style="font-size:13px;color:var(--ink3);margin-bottom:18px;line-height:1.75">Direct access to the cloud database and authentication system.</div>
        <a href="https://console.firebase.google.com/project/cafa-aaes-system/overview" target="_blank" class="btn bo bfw" style="border-radius:10px;padding:12px;color:var(--blue);border-color:var(--blue)"><span style="display:flex;align-items:center;gap:6px">${ICONS.link} Open Firebase Console</span></a>
      </div>

      <div class="card cp" style="border-color:var(--rose)">
        <div class="sti" style="margin-bottom:10px;color:var(--rose)">Emergency Lockdown</div>
        <div style="font-size:13px;color:var(--ink3);margin-bottom:18px;line-height:1.75">Instantly block all non-admin access to the system. Requires Admin Auth.</div>
        <button class="btn bda bsm" id="lockdownBtn" style="border-radius:10px;padding:12px">${S.config.lockdown ? '<span style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:var(--sage)"></div> Lift Lockdown</span>' : '<span style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:var(--rose)"></div> Execute Lockdown</span>'}</button>
      </div>

      <div class="card cp" style="border-color:var(--rose)">
        <div class="sti" style="margin-bottom:10px;color:var(--rose)">Factory Reset</div>
        <div style="font-size:13px;color:var(--ink3);margin-bottom:18px;line-height:1.75">Wipe all users (except system accounts), records, classes, and enrollments.</div>
        <button class="btn bda bsm" id="resetBtn" style="border-radius:10px;padding:12px"><span style="display:flex;align-items:center;gap:6px">${ICONS.warn} Execute Factory Reset</span></button>
      </div>

    </div>
  </div>`;

      var sb2 = document.getElementById('seedBtn2');
      if (sb2) {
        sb2.onclick = async () => {
          const btn = document.getElementById('seedBtn2'); btn.disabled = true; btn.innerHTML = `<span class="spnd"></span>&nbsp;Seeding…`;
          try { await seedCurriculum(); btn.disabled = false; btn.textContent = ' Seed Curriculum'; }
          catch (e) { btn.disabled = false; btn.textContent = ' Seed Curriculum'; toast(e.message, 'error'); }
        };
      }

      var genBtn = document.getElementById('genQrBtn');
      if (genBtn) {
        genBtn.onclick = () => {
          requireAdminAuth(() => {
            modal({
              title: 'Classified: QR Decryption Key',
              body: `<div style="text-align:center; padding:20px; border:2px dashed var(--bd); background:var(--white)">
                   <h2 style="font-family:var(--fd); margin-bottom:16px; font-size:18px">OFFICIAL DEAN'S OVERRIDE KEY</h2>
                   <div style="background:#fff; padding:10px; display:inline-block; border-radius:10px;"><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${QR_SECRET_KEY}" style="margin:auto; display:block;" /></div>
                   <p style="margin-top:16px; font-size:12px; color:var(--rose); font-weight:600">DO NOT SHARE. Highly secure decryption key for post-deadline overrides.</p>
                 </div>`,
              btns: [
                { label: 'Print Card', cls: 'bn', fn: () => { window.print(); } },
                { label: 'Close', cls: 'bo', fn: closeModal }
              ]
            });
          });
        };
      }

      var lkBtn = document.getElementById('lockdownBtn');
      if (lkBtn) {
        lkBtn.onclick = () => {
          requireAdminAuth(async () => {
            if (!S.config.lockdown) {
              modal({
                title: 'Set Lockdown Message',
                body: `<div class="ig"><label class="fl">Notice displayed to users</label><textarea id="ldMsg" class="inp" placeholder="e.g. The portal is currently undergoing grading synchronization...">The CAFA-AAES is currently under an emergency lockdown by the administrator. Normal operations will resume shortly.</textarea></div>`,
                btns: [
                  {
                    label: 'Execute Lockdown', cls: 'bda', fn: async () => {
                      const msg = document.getElementById('ldMsg').value;
                      await db.collection('cafa_meta').doc('config').set({ lockdown: true, lockdownMsg: msg }, { merge: true });
                      toast('System Lockdown Initiated.', 'error');
                      closeModal(); pgDev(C);
                    }
                  },
                  { label: 'Cancel', cls: 'bo', fn: closeModal }
                ]
              });
            } else {
              await db.collection('cafa_meta').doc('config').set({ lockdown: false }, { merge: true });
              toast('System Lockdown Lifted.', 'success');
              pgDev(C);
            }
          });
        };
      }

      var rBtn = document.getElementById('resetBtn');
      if (rBtn) {
        rBtn.onclick = async () => {
          if (!window.confirm('WARNING: This will delete ALL data (except system accounts). Type "CONFIRM" to proceed.')) return;
          const p = window.prompt('Type CONFIRM');
          if (p !== 'CONFIRM') return;

          requireAdminAuth(async () => {
            toast('Wiping database...', 'warning');
            try {
              const SYSTEM_IDS = new Set(['ADMIN-MJM', 'ARCHON-01', 'DEAN-01', 'INST-01', 'STUDENT-01', 'STUDENT-02']);
              for (const col of ['academic_records', 'enrollments', 'classes', 'system_errors', 'announcements']) {
                const snap = await db.collection(col).get();
                if (!snap.empty) { const b = db.batch(); snap.forEach(d => b.delete(d.ref)); await b.commit(); }
              }
              const us = await db.collection('users').get();
              const ub = db.batch();
              us.forEach(d => { if (!SYSTEM_IDS.has(d.data().id_number)) ub.delete(d.ref); });
              await ub.commit();
              toast('Database wiped.', 'success');
            } catch (e) { toast(e.message, 'error'); }
          });
        };
      }
    }

    if (fbReady && typeof initApp === 'function') initApp();
  </script>
</body>
