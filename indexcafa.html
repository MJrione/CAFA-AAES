          const cSec = document.getElementById('cSec').value.trim();
          let cDay = document.getElementById('cDay').value;
          if (cDay === 'CUSTOM') {
            const checked = document.querySelectorAll('#customDaysGrid input:checked');
            cDay = Array.from(checked).map(c => c.value).join(',');
            if (!cDay) { toast('Select at least one day for custom schedule.', 'error'); return; }

          const cTime = document.getElementById('cTime').value.trim();
          const cRoom = document.getElementById('cRoom').value.trim();
          if (!cSubj || !cSec) { toast('Fill in Subject and Section.', 'error'); return; }
          btn.disabled = true; btn.innerHTML = `<span class="spns"></span>`;
          try {
            await db.collection('classes').add({ instructor_uid: S.user.uid, subject_code: cSubj, section: cSec, program: cProg, schedule_day: cDay, schedule_time: cTime, schedule_room: cRoom, created_at: Date.now() });

        if (regBtn) regBtn.onclick = async () => {
          const sId = document.getElementById('newStuId').value.trim().toUpperCase();
          const sName = document.getElementById('newStuName').value.trim();
          const sType = document.getElementById('newStuType').value;
          const sProg = document.getElementById('newStuProg').value;
          const sVer = document.getElementById('newStuVer').value;
          if (!sId || !sName) { toast('Fill in ID and Name.', 'error'); return; }
          regBtn.disabled = true; regBtn.innerHTML = `<span class="spns"></span>`;
          try {
            const userSnap = await db.collection('users').where('id_number', '==', sId).get();
            if (!userSnap.empty) { toast('Student ID already exists!', 'warning'); regBtn.disabled = false; regBtn.textContent = 'Register Student to System'; return; }

            const pseudoEmail = `${sId}${PSEUDO_DOMAIN}`.toLowerCase();
            const pw = '123456';
            const newUser = await createFirebaseUser(pseudoEmail, pw);
            await db.collection('users').doc(newUser.uid).set({
              uid: newUser.uid, email: pseudoEmail, full_name: sName, id_number: sId,
              role: 'student', student_type: sType, program: sProg, curriculum_version: sVer,
              temp_pw: '123456', year_level: 1, current_term: 1,
              section: '', instructor_id: '', isActive: true, isDeleted: false,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            toast(`Student registered (${PROGRAMS[sProg]?.shortName || sProg} ${sVer})! Default PW: 123456`, 'success');
            document.getElementById('newStuId').value = ''; document.getElementById('newStuName').value = '';
            allSysStudents.push({ uid: newUser.uid, full_name: sName, id_number: sId, program: sProg, curriculum_version: sVer });
          } catch (e) { toast(e.message, 'error'); }
          regBtn.disabled = false; regBtn.textContent = 'Register Student to System';
        };

        // Schedule Import Logic
        const importBtn = document.getElementById('importSchedBtn');
        if (importBtn) importBtn.onclick = async () => {
          const fileInput = document.getElementById('schedFile');
          const schedProg = document.getElementById('schedProg').value;
          if (!fileInput || !fileInput.files.length) { toast('Select a file first.', 'error'); return; }
          const file = fileInput.files[0];
          const ext = file.name.split('.').pop().toLowerCase();
          importBtn.disabled = true; importBtn.innerHTML = `<span class="spnd"></span>&nbsp;Parsing...`;
          const preview = document.getElementById('schedPreview');
          try {
            let parsedClasses = [];
            if (ext === 'xlsx' || ext === 'xls') {
              const sheets = await parseExcelSchedule(file);
              sheets.forEach(s => { parsedClasses = parsedClasses.concat(flattenScheduleGrid(s.data)); });
            } else if (ext === 'pdf') {
              const pages = await parsePdfSchedule(file);
              preview.innerHTML = `<div class="ib ibam"><span>${ICONS.alert}</span><div>PDF parsed ${pages.length} pages. Raw text extraction completed. Manual review may be needed.</div></div>`;
              importBtn.disabled = false; importBtn.textContent = '\ud83d\udce5 Parse & Preview Schedule'; return;
            } else {
              toast('Only .xlsx or .pdf files.', 'error');
              importBtn.disabled = false; importBtn.textContent = '\ud83d\udce5 Parse & Preview Schedule'; return;
            }
            if (parsedClasses.length === 0) {
              preview.innerHTML = `<div class="ib ibrs"><span>${ICONS.warn}</span><div>No class entries could be parsed from this file.</div></div>`;
            } else {
              var previewRows = '';
              parsedClasses.slice(0, 50).forEach(function (c) {
                previewRows += '<tr><td style="font-size:12px">' + esc(c.instructor) + '</td><td style="font-family:monospace;font-weight:700;color:var(--sage)">' + esc(c.subject_code) + '</td><td>' + esc(c.section) + '</td><td>' + esc(c.day) + '</td><td style="font-family:monospace">' + esc(c.time) + '</td><td>' + esc(c.room) + '</td></tr>';
              });
              preview.innerHTML = '<div style="font-weight:700;margin-bottom:12px;color:var(--ink)">' + parsedClasses.length + ' class slots parsed</div>' +
                '<div class="tw"><table>' +
                '<thead><tr><th>Instructor</th><th>Subject</th><th>Section</th><th>Day</th><th>Time</th><th>Room</th></tr></thead>' +
                '<tbody>' + previewRows + '</tbody></table></div>' +
                '<button class="btn bp bfw" id="confirmImportBtn" style="margin-top:16px;padding:12px;border-radius:12px">\u2705 Import ' + parsedClasses.length + ' Classes to Firestore</button>';

              const confirmBtn = document.getElementById('confirmImportBtn');
              if (confirmBtn) confirmBtn.onclick = async () => {
                confirmBtn.disabled = true; confirmBtn.innerHTML = `<span class="spns"></span>&nbsp;Importing...`;
                try {
                  const bSize = 450;
                  for (let i = 0; i < parsedClasses.length; i += bSize) {
                    const bt = db.batch();
                    parsedClasses.slice(i, i + bSize).forEach(c => {
                      bt.set(db.collection('classes').doc(), {
                        instructor_uid: S.user.uid, instructor_name: c.instructor,
                        subject_code: c.subject_code, section: c.section, program: schedProg,
                        schedule_day: c.day, schedule_time: c.time, schedule_room: c.room,
                        imported: true, created_at: Date.now()
                      });
                    });
                    await bt.commit();
                  }
                  toast(`${parsedClasses.length} classes imported! \u2713`, 'success');
                  preview.innerHTML = `<div class="ib ibsg"><span>${ICONS.check}</span><div>Successfully imported ${parsedClasses.length} class entries.</div></div>`;
                } catch (e) { toast(e.message, 'error'); confirmBtn.disabled = false; confirmBtn.textContent = 'Retry Import'; }
              };
            }
          } catch (e) { toast('Parse error: ' + e.message, 'error'); }
          importBtn.disabled = false; importBtn.textContent = '\ud83d\udce5 Parse & Preview Schedule';
        };

      }
      render();
    }

            LISTENERS.stop();
            S.tab = 'global';
            document.querySelectorAll('.np').forEach(x => x.classList.toggle('on', x.dataset.tab === 'global'));
            renderMain();
          };
        });

        C.querySelectorAll('.rmClassBtn').forEach(b => {
          b.onclick = async () => {
            if (!confirm('Are you sure you want to delete this class? This will not delete the students, but will remove this class grouping.')) return;

              const classId = b.dataset.id;
              const recsQuery = await db.collection('academic_records').where('class_id', '==', classId).get();

    // ═══════════════════════════════════════════════════════════
    //  INSTRUCTOR — ENROLLMENT QUEUE 
    // ═══════════════════════════════════════════════════════════
    function pgQueue(C) {
      let pending = [], myProcessing = [];

      const unsub = db.collection('enrollments').onSnapshot(snap => {
        pending = []; myProcessing = [];
        snap.forEach(d => {
          const data = { ...d.data(), _id: d.id };
          if (data.status === 'pending') pending.push(data);
          else if (data.status === 'processing' && data.processed_by === S.user.uid) myProcessing.push(data);
        });
        pending.sort((a, b) => (b.submitted?.seconds || 0) - (a.submitted?.seconds || 0));
        myProcessing.sort((a, b) => (b.submitted?.seconds || 0) - (a.submitted?.seconds || 0));
        render();
      }, () => { });
      LISTENERS.add(unsub);

      function render() {
        C.innerHTML = `<div class="pg up">
      <div class="ph"><span class="stg">Instructor Portal</span><div class="pt">Enrollment Request Queue</div></div>
      
      ${myProcessing.length > 0 ? `
      <div class="card cp" style="margin-bottom:24px;border:2px solid var(--sage)">
        <span class="stg" style="background:var(--sagebg);color:var(--sage)">Your Active Processing</span>
        <div class="tw" style="margin-top:12px"><table>
          <thead><tr><th>Student</th><th>Requested Subjects</th><th>Action</th></tr></thead>
          <tbody>${myProcessing.map(e => `<tr>
            <td style="font-weight:700">${esc(e.student_name)} <span style="font-size:10px;color:var(--ink4);display:block">${esc(e.student_id)}</span></td>
            <td style="font-size:12px;font-weight:600;font-family:monospace;color:var(--sage)">
                ${(e.selected || []).join(', ')}
                ${e.schedule_pref ? `<div style="font-size:10.5px;color:var(--ink4);font-family:var(--fb);margin-top:4px;line-height:1.2;font-weight:500;">Sched: ${esc(e.schedule_pref)}</div>` : ''}
            </td>
            <td>
              <div style="display:flex;gap:6px">
                 <button class="btn bo bxs revBtn" data-sid="${esc(e.student_uid)}" data-sname="${esc(e.student_name)}" data-sno="${esc(e.student_id)}">Review</button>
                 <button class="btn bp bxs appr" data-id="${esc(e._id)}">Approve</button>
                 <button class="btn bda bxs rejt" data-id="${esc(e._id)}">Reject</button>
              </div>
            </td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>` : ''}

      <div class="cs"><div class="ch"><div><span class="stg">Global Queue</span><div class="sti">Available Requests</div></div><span class="bdg bsg" style="font-size:12px">${pending.length} pending</span></div>
        ${pending.length === 0 ? `<div class="emp"><div style="display:flex;justify-content:center;margin-bottom:16px;color:var(--ink4)">${ICONS.check}</div><div style="font-family:var(--fd);font-size:18px;color:var(--ink2);font-weight:600">No pending requests.</div></div>`
            : `<div class="tw"><table>
            <thead><tr><th>Student</th><th>Requested Subjects</th><th>Submitted</th><th>Action</th></tr></thead>
            <tbody>${pending.map(e => `<tr>
              <td style="font-weight:700">${esc(e.student_name)} <span style="font-size:10px;color:var(--ink4);display:block">${esc(e.student_id)}</span></td>
              <td style="font-size:12px;font-weight:600;font-family:monospace;color:var(--amber)">
                  ${(e.selected || []).join(', ')}
                  ${e.schedule_pref ? `<div style="font-size:10.5px;color:var(--ink4);font-family:var(--fb);margin-top:4px;line-height:1.2;font-weight:500;">Sched: ${esc(e.schedule_pref)}</div>` : ''}
              </td>
              <td style="font-size:11px;color:var(--ink3)">${fmtD(e.submitted)}</td>
              <td><button class="btn bam bxs claimBtn" data-id="${esc(e._id)}">Claim to Process</button></td>
            </tr>`).join('')}</tbody>
          </table></div>`}
      </div>
    </div>`;

        C.querySelectorAll('.claimBtn').forEach(b => b.onclick = async () => {
          try {
            const docRef = db.collection('enrollments').doc(b.dataset.id);
            const docSnap = await docRef.get();
            if (docSnap.data().status !== 'pending') { toast('Already claimed by another instructor.', 'error'); return; }
            await docRef.update({ status: 'processing', processed_by: S.user.uid });
            toast('Request claimed.', 'success');
          } catch (e) { toast(e.message, 'error'); }
        });

        C.querySelectorAll('.revBtn').forEach(b => b.onclick = async () => {
          const sid = b.dataset.sid;
          const sname = b.dataset.sname;
          const sno = b.dataset.sno;
          try {
            const recSnap = await db.collection('academic_records').where('student_uid', '==', sid).get();
            const recs = {};
            recSnap.forEach(d => { if (d.data().isDeleted === false) recs[d.data().course_code] = d.data() });
            modal({
              title: `Curriculum Review`,
              body: `<div id="revModalContainer" style="max-height:60vh;overflow-y:auto;width:100%;"></div>`,
              btns: [{ label: 'Close View', cls: 'bo', fn: closeModal }]
            });
            if (typeof window.renderChecklistTable === 'function') {
              window.renderChecklistTable(document.getElementById('revModalContainer'), { full_name: sname, id_number: sno }, recs, true);
            }
          } catch (e) { toast('Error loading matrix.', 'error'); }
        });

        C.querySelectorAll('.appr').forEach(b => b.onclick = async () => {
          b.disabled = true;
          try {
            const eId = b.dataset.id;
            const eDoc = await db.collection('enrollments').doc(eId).get();
            const eData = eDoc.data();
            const termStr = `${new Date().getFullYear()}-${new Date().getFullYear() + 1}-T${S.config.term || 1}`;

            const batch = db.batch();
            eData.selected.forEach(subj => {
              const ref = db.collection('academic_records').doc();
              batch.set(ref, {
                student_uid: eData.student_uid, student_name: eData.student_name, student_id: eData.student_id,
                course_code: subj, term_enrolled: termStr, instructor_uid: S.user.uid,
                raw_grade: null, final_grade: null, status: 'Pending', isLocked: false, isDeleted: false, lastUpdated: firebase.firestore.FieldValue.serverTimestamp(), overrideLog: []
              });
            });
            batch.update(eDoc.ref, { status: 'approved' });
            await batch.commit();
            toast('Enrollment Approved and Records Created!', 'success');
          } catch (e) { toast(e.message, 'error'); b.disabled = false; }
        });

        C.querySelectorAll('.rejt').forEach(b => b.onclick = () => {
          modal({
            title: 'Reject Enrollment Request',
            sub: 'Optional: Provide a reason for rejection (e.g., "Schedule conflict", "No slots left").',
            accent: '#c05e6a',
            body: `<input id="rejReason" class="inp" placeholder="Reason for rejection..."/>`,
            btns: [
              {
                label: 'Reject', cls: 'bda', fn: async () => {
                  const r = document.getElementById('rejReason').value.trim();
                  closeModal();
                  try {
                    await db.collection('enrollments').doc(b.dataset.id).update({
                      status: 'rejected', reject_reason: r, processed_by: S.user.uid, reviewed: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    toast('Request rejected.', 'warning');
                  } catch (e) { toast(e.message, 'error'); }
                }
              },
              { label: 'Cancel', cls: 'bo', fn: closeModal }
            ]
          });
        });
      }
    }

    // ═══════════════════════════════════════════════════════════
    //  INSTRUCTOR — GLOBAL GRADING (SEARCH ANY & MY CLASSES)
    // ═══════════════════════════════════════════════════════════
    function pgGlobal(C) {
      let globalStudents = [], myClasses = [], selStu = S.globalSelStu || null, selClass = S.gradeSelClass || null, LIVE = {}, tableDrawn = false;
      let viewMode = S.gradeViewMode || 'classes';
      const isPastDeadline = S.config && S.config.deadline && Date.now() > S.config.deadline;

      function captureAll() {
        if (!C) return;
        C.querySelectorAll('.gi').forEach(inp => { const k = inp.dataset.key; if (!DRAFTS[k]) DRAFTS[k] = { g: '', ov: '' }; DRAFTS[k].g = inp.value; });
        C.querySelectorAll('.gv').forEach(sel2 => { const k = sel2.dataset.key; if (!DRAFTS[k]) DRAFTS[k] = { g: '', ov: '' }; DRAFTS[k].ov = sel2.value; });
        C.querySelectorAll('.cond-reason-draft').forEach(hdn => { const k = hdn.dataset.key; if (!DRAFTS[k]) DRAFTS[k] = { g: '', ov: '' }; DRAFTS[k].condReason = hdn.value; });
      }

      function patchRow(key, rec) {
        const row = C.querySelector(`tr[data-row="${key}"]`); if (!row) return;
        const resCell = row.querySelector('.cell-result');
        const sealCell = row.querySelector('.cell-sealed');
        const actCell = row.querySelector('.cell-action');
        if (!resCell || !sealCell || !actCell) return;

        const locked = (rec && rec.isLocked) || false;
        resCell.innerHTML = rec ? bdg(rec.status) : `<span class="bdg bpd">Unassigned</span>`;
        sealCell.innerHTML = lkH(!!locked);

        const isCondUnlocked = DRAFTS[key] && DRAFTS[key].condUnlocked;
        const adminUnlocked = rec && rec.isLocked === false && rec.overrideLog && rec.overrideLog.length > 0;

        // Read-only logic: If this record is owned by a different instructor
        const noRecord = !rec;
        const isMine = !noRecord && (rec.instructor_uid === S.user.uid);
        const isReadOnly = !noRecord && !isMine;
        const shouldDisable = !isCondUnlocked && (locked || (isPastDeadline && !adminUnlocked) || isReadOnly || noRecord);

        if (isCondUnlocked) {
           const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;gap:6px';
           const sb = document.createElement('button'); sb.className = 'btn bp bxs'; sb.dataset.key = key; sb.textContent = 'Save COND'; sb.onclick = () => saveGrade(key);
           wrap.appendChild(sb);
           actCell.innerHTML = ''; actCell.appendChild(wrap);
           const inp = row.querySelector('.gi'), ov = row.querySelector('.gv');
           if (inp) inp.disabled = false; if (ov) ov.disabled = false;
        } else if (noRecord) {
           if (viewMode === 'global') {
               const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;gap:6px;align-items:center';
               const sp = document.createElement('span'); sp.style.cssText = 'font-size:11px;font-weight:600;color:var(--rose)'; sp.textContent = 'Missing Data';
               const b = document.createElement('button'); b.className = 'btn bo bxs cond-btn'; b.dataset.key = key; b.textContent = 'Unlock (COND)';
               b.onclick = () => {
                   modal({
                      title: 'Conditional Override (COND)',
                      sub: 'Create temporary grading entry for pre-requisite bypassing or data migration.',
                      accent: '#d97706',
                      body: `<input id="creason" class="inp" placeholder="Reason (e.g., Paper Migration)..." style="width:100%"/>`,
                      btns: [
                         { label: 'Unlock Row', cls: 'bp', fn: () => {
                             const r = document.getElementById('creason').value.trim();
                             if(!r) return toast('Reason required.', 'error');
                             closeModal();
                             if (!DRAFTS[key]) DRAFTS[key] = { g: '', ov: 'COND' };
                             DRAFTS[key].condUnlocked = true;
                             DRAFTS[key].condReason = r;
                             DRAFTS[key].ov = 'COND';
                             
                             let hdn = row.querySelector('.cond-reason-draft');
                             if (!hdn) { hdn = document.createElement('input'); hdn.type = 'hidden'; hdn.className = 'cond-reason-draft'; hdn.dataset.key = key; row.querySelector('td:nth-child(4)').appendChild(hdn); }
                             hdn.value = r;
                             
                             const ovSel = row.querySelector('.gv');
                             if (ovSel) ovSel.value = 'COND';
                             
                             patchRow(key, rec);
                         }},
                         { label: 'Cancel', cls: 'bo', fn: closeModal }
                      ]
                   });
               };
               wrap.appendChild(sp); wrap.appendChild(b);
               actCell.innerHTML = ''; actCell.appendChild(wrap);
           } else {
               actCell.innerHTML = `<span style="font-size:11px;font-weight:600;color:var(--rose)">Not Enrolled / Acquired</span>`;
           }
           const inp = row.querySelector('.gi'), ov = row.querySelector('.gv');
           if (inp) inp.disabled = true; if (ov) ov.disabled = true;
        } else if (shouldDisable) {
          actCell.innerHTML = `<span style="font-size:11px;font-weight:600;color:var(--ink4)">${isReadOnly ? 'Assessed by other' : (isPastDeadline ? 'Deadline Passed' : 'Sealed')}</span>`;
          const inp = row.querySelector('.gi'), ov = row.querySelector('.gv');
          if (inp) inp.disabled = true; if (ov) ov.disabled = true;
        } else {
          const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;gap:6px';
          const sb = document.createElement('button'); sb.className = 'btn bo bxs'; sb.dataset.key = key; sb.textContent = 'Save'; sb.onclick = () => saveGrade(key);
          const lb = document.createElement('button'); lb.className = 'btn bda bxs'; lb.dataset.key = key; lb.textContent = 'Seal';
          if (!rec) lb.disabled = true; else lb.onclick = () => confirmSeal(key);
          if (viewMode === 'classes') {
            const remB = document.createElement('button'); remB.className = 'btn bo bxs rm-stu-btn'; remB.dataset.key = key; remB.innerHTML = ICONS.x; remB.title = 'Remove Student'; remB.onclick = () => removeStudent(key);
            wrap.appendChild(sb); wrap.appendChild(lb); wrap.appendChild(remB);
          } else {
            wrap.appendChild(sb); wrap.appendChild(lb);
          }
          actCell.innerHTML = ''; actCell.appendChild(wrap);
          const inp = row.querySelector('.gi'), ov = row.querySelector('.gv');
          if (inp) inp.disabled = false; if (ov) ov.disabled = false;
        }
      }

      async function saveGrade(key) {
        const condReasonInput = C.querySelector(`.cond-reason-draft[data-key="${key}"]`);
        const condReasonStr = condReasonInput ? condReasonInput.value : '';

        const ex = LIVE[key];
        const adminUnlocked = ex && ex.isLocked === false && ex.overrideLog && ex.overrideLog.length > 0;
        if (isPastDeadline && !adminUnlocked) { toast('System Locked: Deadline Reached.', 'error'); return; }

        captureAll();
        const d = DRAFTS[key] || { g: '', ov: '' };
        const raw = (d.g || '').trim(), over = (d.ov || '').trim();
        let fg, status;
        if (['INC', 'NFE', 'DRP'].includes(over)) { fg = over; status = over; }
        else { const n = parseFloat(raw); if (!isNaN(n) && (n < 0 || n > 100)) { toast('Grade must be between 0 and 100.', 'error'); return; } fg = isNaN(n) ? null : n; status = isNaN(n) ? 'Pending' : n >= 75 ? 'Passed' : 'Failed'; }

        const saveBtn = C.querySelector(`button[data-key="${key}"].bo`); if (saveBtn) { saveBtn.disabled = true; saveBtn.innerHTML = `<span class="spnd"></span>`; }

        try {
          if (!ex && !condReasonStr) throw new Error("Record not found.");
          if (ex && ex.isLocked) return;

          // Prevent saving if they somehow bypass the UI block
          if (ex.instructor_uid !== S.user.uid) throw new Error("Permission Denied: You are not the assigned instructor for this record.");

          
          if (condReasonStr) { status = 'COND'; fg = parseFloat(raw) || null; }
          const termStr = `${new Date().getFullYear()}-${new Date().getFullYear() + 1}-T${S.config.term || 1}`;
          const safeOverLog = (ex && ex.overrideLog) ? ex.overrideLog : [];
          if (condReasonStr) safeOverLog.push(`COND Override: ${condReasonStr} (${new Date().toLocaleDateString()})`);

          if (!ex) {
             // Create as conditional override
             const cY = selStu.year_level || 1, cT = selStu.current_term || 1;
             await db.collection('academic_records').add({
                student_uid: selStu.uid, student_name: selStu.full_name, student_id: selStu.id_number,
                course_code: key, term_enrolled: termStr, instructor_uid: S.user.uid, class_id: null, section: 'COND-MIG',
                raw_grade: parseFloat(raw) || null, final_grade: fg, status: status, isLocked: false, isDeleted: false, lastUpdated: firebase.firestore.FieldValue.serverTimestamp(), overrideLog: safeOverLog
             });
          } else {
             await db.collection('academic_records').doc(ex._id).update({
               raw_grade: parseFloat(raw) || null, final_grade: fg, status: status, overrideLog: safeOverLog, lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
             });
          }

          delete DRAFTS[key];
          toast(`Grade saved `, 'success', 2000);
        } catch (e) { toast('Error: ' + e.message, 'error'); if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save'; } }
      }

      function confirmSeal(key) {
        const ex = LIVE[key];
        const adminUnlocked = ex && ex.isLocked === false && ex.overrideLog && ex.overrideLog.length > 0;
        if (isPastDeadline && !adminUnlocked) { toast('System Locked: Deadline Reached.', 'error'); return; }
        if (!ex || (!ex.status || ex.status === 'Pending')) { toast('Please save a grade before sealing.', 'warning'); return; }

        modal({
          title: `Seal Record?`, sub: 'Requires Admin override to modify after sealing.', accent: '#e07f56',
          body: `<div class="ib ibam"><span>${ICONS.warn}</span><div>Only the Admin can unlock once sealed. Logged in audit trail.</div></div>`,
          btns: [{
            label: 'Yes, Seal', cls: 'bpe', fn: async () => {
              closeModal();
              if (!ex || !ex._id) return;
              try { await db.collection('academic_records').doc(ex._id).update({ isLocked: true, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }); toast(`Record sealed `, 'warning'); } catch (e) { }
            }
          }, { label: 'Cancel', cls: 'bo', fn: closeModal }]
        });
      }

      async function removeStudent(key) {
        if (!confirm('Remove student from class?')) return;
        try { await db.collection('academic_records').doc(key).update({ class_id: null, section: '' }); toast('Removed from class.', 'success'); } catch (e) { toast(e.message, 'error'); }
      }

      async function saveAll() {
        if (isPastDeadline) { toast('System Locked: Deadline Reached.', 'error'); return; }
        captureAll();
        const batch = db.batch();
        let count = 0;
        for (const key of Object.keys(LIVE)) {
          const ex = LIVE[key];
          if (ex && ex.isLocked) continue;
          if (ex && ex.instructor_uid !== S.user.uid) continue; // Ownership check
          const d = DRAFTS[key];
          if (!d) continue;

          const raw = (d.g || '').trim(), over = (d.ov || '').trim();
          let fg, status;
          if (['INC', 'NFE', 'DRP'].includes(over)) { fg = over; status = over; }
          else { const n = parseFloat(raw); if (!isNaN(n) && (n < 0 || n > 100)) { continue; } fg = isNaN(n) ? null : n; status = isNaN(n) ? 'Pending' : n >= 75 ? 'Passed' : 'Failed'; }

          batch.update(db.collection('academic_records').doc(ex._id), {
            raw_grade: parseFloat(raw) || null, final_grade: fg, status: status, lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
          });
          delete DRAFTS[key];
          count++;
        }
        if (count > 0) {
          try { await batch.commit(); toast(`${count} drafts saved!`, 'success'); } catch (e) { toast(e.message, 'error'); }
        } else { toast('No new drafts to save.', 'info'); }
      }

      async function sealAll() {
        if (isPastDeadline) { toast('System Locked: Deadline Reached.', 'error'); return; }
        modal({
          title: `Seal All Shown Grades?`, sub: `This will permanently finalize all open records.`, accent: '#e07f56',
          body: `<div class="ib ibam"><span>${ICONS.warn}</span><div>Ensure all records are saved before sealing. Unsaved text box changes will be ignored.</div></div>`,
          btns: [{
            label: 'Yes, Seal All', cls: 'bpe', fn: async () => {
              closeModal();
              const batch = db.batch();
              let count = 0;
              for (const key of Object.keys(LIVE)) {
                const ex = LIVE[key];
                if (ex && ex.isLocked) continue;
                if (!ex.status || ex.status === 'Pending') continue;

                batch.update(db.collection('academic_records').doc(ex._id), {
                  isLocked: true, lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                });
                count++;
              }
              if (count > 0) {
                try { await batch.commit(); toast(`${count} grades sealed!`, 'success'); } catch (e) { toast(e.message, 'error'); }
              } else { toast('No valid grades to seal.', 'info'); }
            }
          }, { label: 'Cancel', cls: 'bo', fn: closeModal }]
        });
      }

      let recUnsub = null;
      function startRecListener() {
        if (recUnsub) { recUnsub(); recUnsub = null; }
        if (viewMode === 'classes') {
          if (!selClass) { drawTable(); return; }
          recUnsub = db.collection('academic_records').where('class_id', '==', selClass._id).onSnapshot(snap => {
            const prev = { ...LIVE };
            LIVE = {};
            snap.forEach(d => {
              if (d.data().isDeleted === false) LIVE[d.id] = { ...d.data(), _id: d.id };
            });
            if (tableDrawn) {
              const currentRows = C.querySelectorAll('tr[data-row]').length;
              if (currentRows !== Object.keys(LIVE).length) {
                captureAll();
                drawTable();
              } else {
                Object.keys(LIVE).forEach(k => patchRow(k, LIVE[k]));
                Object.keys(prev).forEach(k => { if (!LIVE[k]) patchRow(k, null); });
              }
            } else { drawTable(); }
          }, () => { });
        } else {
          if (!selStu) { drawTable(); return; }
          recUnsub = db.collection('academic_records').where('student_uid', '==', selStu.uid).onSnapshot(snap => {
            const prev = { ...LIVE };
            LIVE = {};
            snap.forEach(d => {
              if (d.data().isDeleted === false) LIVE[d.data().course_code] = { ...d.data(), _id: d.id };
            });
            if (tableDrawn) {
              Object.keys(LIVE).forEach(k => patchRow(k, LIVE[k]));
              Object.keys(prev).forEach(k => { if (!LIVE[k]) patchRow(k, null); });
            } else { drawTable(); }
          }, () => { });
        }
        LISTENERS.add(recUnsub);
      }

      function drawSearchArea() {
        const searchDiv = C.querySelector('#searchArea');
        if (!searchDiv) return;
        if (viewMode === 'classes') {
          searchDiv.innerHTML = `
          <label class="fl" style="color:var(--sage)">1. Select a Class</label>
          <select class="inp" id="classSelInp" style="font-weight:600;font-size:14px;border-color:var(--sage);max-width:400px">
            <option value="">-- Choose My Class --</option>
            ${myClasses.map(c => `<option value="${esc(c._id)}"${selClass && c._id === selClass._id ? ' selected' : ''}>${esc(c.subject_code)} - ${esc(c.section)}</option>`).join('')}
          </select>
        `;
          const si = document.getElementById('classSelInp');
          if (si) {
            si.onchange = e => {
              captureAll();
              selClass = myClasses.find(c => c._id === e.target.value);
              S.gradeSelClass = selClass;
              LIVE = {}; tableDrawn = false; startRecListener();
            };
          }
        } else {
          searchDiv.innerHTML = `
          <label class="fl" style="color:var(--amber)">1. Global Search (Type ID/Name)</label>
          <input list="dlStuAllGlob" id="stuSelInpGlob" class="inp" placeholder="Search any student in the system..." value="${selStu ? esc(selStu.full_name) + ' (' + esc(selStu.id_number) + ')' : ''}" style="font-weight:600;font-size:14px;border-color:var(--amber);max-width:400px"/>
          <datalist id="dlStuAllGlob">
            ${globalStudents.map(s => `<option value="${esc(s.full_name)} (${esc(s.id_number)})"></option>`).join('')}
          </datalist>
        `;
          const si = document.getElementById('stuSelInpGlob');
          if (si) {
            si.onchange = e => {
              captureAll();
              const val = e.target.value;
              selStu = globalStudents.find(s => `${s.full_name} (${s.id_number})` === val);
              S.globalSelStu = selStu;
              LIVE = {}; tableDrawn = false; startRecListener();
            };
          }
        }
      }

      function drawTable() {
        let tableContent = '';

        if (viewMode === 'classes') {
          if (!selClass) {
            tableContent = `<div class="card cp" style="text-align:center;padding:64px 24px"><div style="display:flex;justify-content:center;margin-bottom:16px;color:var(--ink4)">${ICONS.class}</div><div class="sti">Select a class to view its students</div></div>`;
          } else {
            const recs = Object.values(LIVE).sort((a, b) => a.student_name.localeCompare(b.student_name));
            tableContent = `
          <div class="card cp" style="margin-bottom:24px">
            <span class="stg">Add Student to Class</span><div class="sti" style="margin-bottom:12px">Search Existing Student</div>
            <div class="ir c2">
               <div>
                 <label class="fl">Search System Student</label>
                 <input list="dlAllStuGlob" class="inp" id="addStuIdGlob" placeholder="Type ID or Name..."/>
                 <datalist id="dlAllStuGlob">
                   ${globalStudents.map(s => `<option value="${esc(s.id_number)}">${esc(s.full_name)}</option>`).join('')}
                 </datalist>
               </div>
               <div style="display:flex;align-items:flex-end"><button class="btn bp bfw" id="addRosterBtnGlob" style="height:44px;border-radius:10px;font-size:14px">Add to Roster</button></div>
            </div>
          </div>
          <div class="cs">
            <div class="ch">
               <div><span class="stg">Grading Roster</span><div class="sti">${esc(selClass.subject_code)} - ${esc(selClass.section)}</div></div>
               <div style="display:flex; gap:8px;">
                 <button class="btn bo" id="saveAllBtn" style="height:40px;padding:0 20px;border-radius:10px"${isPastDeadline || recs.length === 0 ? ' disabled' : ''}>Save All</button>
                 <button class="btn bda" id="sealAllBtn" style="height:40px;padding:0 20px;border-radius:10px"${isPastDeadline || recs.length === 0 ? ' disabled' : ''}>${ICONS.lock} Seal All</button>
               </div>
            </div>
            ${recs.length === 0 ? `<div class="emp"><div style="display:flex;justify-content:center;margin-bottom:16px;color:var(--ink4)">${ICONS.users}</div><div style="font-family:var(--fd);font-size:18px;color:var(--ink2);font-weight:600">No students in this class yet</div></div>`
                : `<div class="tw"><table>
                <thead><tr>${['Student Name', 'ID Number', 'Grade (0-100)', 'Override', 'Result', 'Sealed', 'Action'].map(h => `<th>${h}</th>`).join('')}</tr></thead>
                <tbody>${recs.map(rec => {
                  const key = rec._id, locked = (rec && rec.isLocked) || false;
                  const adminUnlocked = rec && rec.isLocked === false && rec.overrideLog && rec.overrideLog.length > 0;
                  const dsbl = locked || (isPastDeadline && !adminUnlocked) ? ' disabled' : '';
                  const d = DRAFTS[key] || {};
                  const gv = d.g !== undefined ? d.g : (typeof rec.raw_grade === 'number' ? rec.raw_grade : '');
                  const ovv = d.ov !== undefined ? d.ov : (['INC', 'NFE', 'DRP'].includes(rec.status) ? rec.status : '');

                  return `<tr data-row="${esc(key)}">
                    <td style="font-weight:700;color:var(--ink)">${esc(rec.student_name)}</td>
                    <td style="font-family:monospace;color:var(--sage);font-size:13px;font-weight:600">${esc(rec.student_id)}</td>
                    <td><input class="inp gi" type="text" data-key="${esc(key)}" value="${esc(String(gv))}" placeholder="0–100" style="width:78px;padding:8px 12px;font-weight:600;text-align:center"${dsbl}/></td>
                    <td><select class="inp gv" data-key="${esc(key)}" style="width:84px;padding:8px;font-weight:600"${dsbl}>
                      <option value="">Auto</option>
                      <option value="INC"${ovv === 'INC' ? ' selected' : ''}>INC</option>
                      <option value="NFE"${ovv === 'NFE' ? ' selected' : ''}>NFE</option>
                      <option value="DRP"${ovv === 'DRP' ? ' selected' : ''}>DRP</option>
                      <option value="COND"${ovv === 'COND' ? ' selected' : ''}>COND</option>
                    </select></td>
                    <td class="cell-result">${bdg(rec.status)}</td>
                    <td class="cell-sealed">${lkH(locked)}</td>
                    <td class="cell-action">${(locked || (isPastDeadline && !adminUnlocked)) ? `<span style="font-size:11px;font-weight:600;color:var(--ink4)">${isPastDeadline ? 'Deadline Passed' : 'Sealed'}</span>` : `<div style="display:flex;gap:6px">
                      <button class="btn bo bxs" data-key="${esc(key)}" onclick="void 0">Save</button>
                      <button class="btn bda bxs" data-key="${esc(key)}" onclick="void 0">Seal</button>
                      <button class="btn bo bxs rm-stu-btn" data-key="${esc(key)}" title="Remove Student" onclick="void 0">${ICONS.x}</button>
                    </div>`}</td>
                  </tr>`;

                <div style="font-weight:700;font-size:16px;color:var(--ink)">${esc(selStu.full_name)}'s Curriculum Load</div>
                ${(S.doc.role === 'admin' || S.doc.role === 'dean') ? `<button class="btn bo bxs" id="switchCurBtn" style="font-size:11px;border-color:var(--amber);color:var(--amber)">Switch Curriculum Profile</button>` : ''}

            </div>
            <div class="tw"><table>
                <thead><tr>${['Course', 'Title', 'Units', 'Grade (0–100)', 'Override', 'Result', 'Sealed', 'Actions'].map(h => `<th>${h}</th>`).join('')}</tr></thead>
                <tbody>${tc.map((c, idx, arr) => {
              let l_s_class = '';
              if (c.course_code.endsWith('L') && arr[idx+1] && arr[idx+1].course_code.replace(/S$/, 'L') === c.course_code) { l_s_class = ' border-bottom:1px dashed var(--bd); background:var(--paper);'; }
              if (c.course_code.endsWith('S') && arr[idx-1] && arr[idx-1].course_code.replace(/L$/, 'S') === c.course_code) { l_s_class = ' border-top:none; background:var(--paper);'; }

              const key = c.course_code, rec = LIVE[key], locked = (rec && rec.isLocked) || false;
              const adminUnlocked = rec && rec.isLocked === false && rec.overrideLog && rec.overrideLog.length > 0;

              const noRecord = !rec;
              const isMine = !noRecord && (rec.instructor_uid === S.user.uid);
              const isReadOnly = !noRecord && !isMine;

              const isCondUnlocked = DRAFTS[key] && DRAFTS[key].condUnlocked;
              const dsbl = !isCondUnlocked && (locked || (isPastDeadline && !adminUnlocked) || isReadOnly || noRecord) ? ' disabled' : '';
              const d = DRAFTS[key] || {};
              const gv = d.g !== undefined ? d.g : (rec && typeof rec.raw_grade === 'number' ? rec.raw_grade : '');
              const ovv = d.ov !== undefined ? d.ov : (rec && rec.status && ['INC', 'NFE', 'DRP'].includes(rec.status) ? rec.status : '');
              return `<tr data-row="${esc(key)}" style="${l_s_class}">
                    <td style="font-family:monospace;font-weight:700;color:var(--sage);font-size:13px">${esc(key)}</td>
                    <td class="title-cell">${esc(c.descriptive_title)}</td>
                    <td style="font-family:monospace;color:var(--ink3);font-size:13px;text-align:center">${c.units}</td>
                    <td><input class="inp gi" type="text" data-key="${esc(key)}" value="${esc(String(gv))}" placeholder="0–100" style="width:78px;padding:8px 12px;font-weight:600;text-align:center"${dsbl}/>
                     ${isCondUnlocked ? `<input type="hidden" class="cond-reason-draft" data-key="${esc(key)}" value="${esc(DRAFTS[key].condReason || '')}"/>` : ''}</td>
                    <td><select class="inp gv" data-key="${esc(key)}" style="width:84px;padding:8px;font-weight:600"${dsbl}>
                      <option value="">Auto</option>
                      <option value="INC"${ovv === 'INC' ? ' selected' : ''}>INC</option>
                      <option value="NFE"${ovv === 'NFE' ? ' selected' : ''}>NFE</option>
                      <option value="DRP"${ovv === 'DRP' ? ' selected' : ''}>DRP</option>
                      <option value="COND"${ovv === 'COND' ? ' selected' : ''}>COND</option>
                    </select></td>
                    <td class="cell-result">${rec ? bdg(rec.status) : `<span class="bdg bpd">Unassigned</span>`}</td>
                    <td class="cell-sealed">${lkH(locked)}</td>
                    <td class="cell-action">${isCondUnlocked ? `<div style="display:flex;gap:6px"><button class="btn bp bxs" data-key="${esc(key)}" onclick="void 0">Save COND</button></div>` : noRecord ? `<div style="display:flex;gap:6px;align-items:center"><span style="font-size:11px;font-weight:600;color:var(--rose)">Missing Data</span><button class="btn bo bxs cond-btn" data-key="${esc(key)}" onclick="void 0">Unlock (COND)</button></div>` : (locked || (isPastDeadline && !adminUnlocked) || isReadOnly) ? `<span style="font-size:11px;font-weight:600;color:var(--ink4)">${isReadOnly ? 'Assessed by other' : (isPastDeadline ? 'Deadline Passed' : 'Sealed')}</span>` : `<div style="display:flex;gap:6px">
                      <button class="btn bo bxs" data-key="${esc(key)}" onclick="void 0">Save</button>
                      <button class="btn bda bxs" data-key="${esc(key)}"${!rec ? ' disabled' : ''} onclick="void 0">Seal</button>
                    </div>`}</td>
                  </tr>`;
            }).join('')}</tbody>
              </table></div>
          </div>`;
          }
        }

        C.innerHTML = `<div class="pg up">
      <div class="ph"><span class="stg">Instructor Portal</span>
        <div class="pt">Grade Assessment Terminal</div>
      </div>
      
      <div class="seg-ctrl">
         <button class="seg-btn ${viewMode === 'classes' ? 'active' : ''}" id="btnModeAdv"> My Classes Mode</button>
         <button class="seg-btn ${viewMode === 'global' ? 'active' : ''}" id="btnModeGlob"> Global Class Mode</button>
      </div>

      ${isPastDeadline ? `<div class="ib ibrs" style="margin-bottom:20px;padding:16px"><span style="font-size:20px">${ICONS.warn}</span><div><strong style="font-size:14px;display:block;margin-bottom:4px">SYSTEM LOCKED: DEADLINE PASSED.</strong> Grade compilation is now closed. Any changes require the Dean's QR Override Key.</div></div>` : ''}
      
      <div class="card cp" style="margin-bottom:24px">
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end">
          <div style="flex:1;min-width:240px" id="searchArea"></div>
        </div>
      </div>
      
      ${tableContent}
    </div>`;

        C.querySelector('#btnModeAdv').onclick = () => { captureAll(); viewMode = 'classes'; S.gradeViewMode = 'classes'; LIVE = {}; tableDrawn = false; startRecListener(); };
        C.querySelector('#btnModeGlob').onclick = () => { captureAll(); viewMode = 'global'; S.gradeViewMode = 'global'; LIVE = {}; tableDrawn = false; startRecListener(); };

        drawSearchArea();

        const addRosterBtnGlob = document.getElementById('addRosterBtnGlob');
        if (addRosterBtnGlob) addRosterBtnGlob.onclick = async () => {
          const sId = document.getElementById('addStuIdGlob').value.trim().toUpperCase();
          if (!sId) { toast('Select a student ID.', 'error'); return; }
          addRosterBtnGlob.disabled = true; addRosterBtnGlob.innerHTML = `<span class="spns"></span>`;
          try {
            const studentDoc = globalStudents.find(s => s.id_number === sId || s.full_name.toUpperCase() === sId);
            if (!studentDoc) throw new Error('Student not found in system. Please use Class Management tab to register them first.');

            // Strict Curriculum Validation
            const sSubjs = Object.values(CURRICULUM_DB).filter(c => c.program === studentDoc.program && c.curriculum_version === studentDoc.curriculum_version);
            if (!sSubjs.some(c => c.course_code === selClass.subject_code)) {
              throw new Error(`Subject ${selClass.subject_code} is not aligned with ${studentDoc.full_name}'s curriculum (${studentDoc.program} ${studentDoc.curriculum_version}).`);
            }

            const existSnap = await db.collection('academic_records').where('student_uid', '==', studentDoc.uid).where('course_code', '==', selClass.subject_code).get();
            const existingRecord = existSnap.docs.find(d => d.data().isDeleted === false);

            if (existingRecord) {
              await db.collection('academic_records').doc(existingRecord.id).update({
                class_id: selClass._id, section: selClass.section, instructor_uid: S.user.uid
              });
            } else {
              const termStr = `${new Date().getFullYear()}-${new Date().getFullYear() + 1}-T${S.config.term || 1}`;
              await db.collection('academic_records').add({
                student_uid: studentDoc.uid, student_name: studentDoc.full_name, student_id: studentDoc.id_number,
                course_code: selClass.subject_code, term_enrolled: termStr, instructor_uid: S.user.uid, class_id: selClass._id, section: selClass.section,
                raw_grade: null, final_grade: null, status: 'Pending', isLocked: false, isDeleted: false, lastUpdated: firebase.firestore.FieldValue.serverTimestamp(), overrideLog: []
              });
            }
            toast('Student added to class roster!', 'success');
            document.getElementById('addStuIdGlob').value = '';
          } catch (e) { toast(e.message, 'error'); }
          addRosterBtnGlob.disabled = false; addRosterBtnGlob.textContent = 'Add to Roster';
        };

        const saBtn = document.getElementById('saveAllBtn');
        if (saBtn) saBtn.onclick = saveAll;

        const slBtn = document.getElementById('sealAllBtn');
        if (slBtn) slBtn.onclick = sealAll;

        const sCurBtn = C.querySelector('#switchCurBtn');
        if (sCurBtn) {
          sCurBtn.onclick = () => {
            if (S.doc.role !== 'admin' && S.doc.role !== 'dean') return;

            const cvDefs = CURRICULUM_VERSIONS || { BSAR: ['2023', '2018'], BFA: ['2023'], MSAR: ['2023'] };
            const initialProg = selStu.program || 'BSAR';
            const generateVerOptions = (prog) => (cvDefs[prog] || ['2023']).map(v => `<option value="${v}" ${v === (selStu.curriculum_version || '2023') ? 'selected' : ''}>${v}</option>`).join('');

            modal({
              title: 'Override Student Curriculum',
              sub: `Currently: ${selStu.program} ${selStu.curriculum_version}. Warning: Changing this may orphan previous course records.`,
              raw: `
                   <div style="margin-bottom:12px">
                      <label class="fl">New Program</label>
                      <select id="nProgBtn" class="inp" style="width:100%">${Object.entries(PROGRAMS).map(([k, v]) => `<option value="${k}" ${k === selStu.program ? 'selected' : ''}>${v.shortName}</option>`).join('')}</select>
                   </div>
                   <div>
                      <label class="fl">New Curriculum Version</label>
                      <select id="nVerBtn" class="inp" style="width:100%">${generateVerOptions(initialProg)}</select>
                   </div>
                 `,
              btns: [
                {
                  label: 'Confirm Switch', cls: 'bp', fn: async () => {
                    const np = document.getElementById('nProgBtn').value;
                    const nv = document.getElementById('nVerBtn').value;
                    try {
                      await db.collection('users').doc(selStu.uid).update({ program: np, curriculum_version: nv });
                      toast('Student curriculum updated successfully!', 'success');
                      closeModal();
                      selStu.program = np; selStu.curriculum_version = nv;
                      S.globalSelStu = selStu;
                      S.cur = Object.values(CURRICULUM_DB).filter(c => c.program === np && c.curriculum_version === nv).reduce((acc, c) => { acc[c.course_code] = c; return acc; }, {});
                      renderMain();
                    } catch (e) { toast(e.message, 'error'); }
                  }
                },
                { label: 'Cancel', cls: 'bo', fn: closeModal }
              ]
            });

            setTimeout(() => {
              const pSel = document.getElementById('nProgBtn');
              const vSel = document.getElementById('nVerBtn');
              if (pSel && vSel) {
                pSel.onchange = () => {
                  vSel.innerHTML = (cvDefs[pSel.value] || ['2023']).map(v => `<option value="${v}">${v}</option>`).join('');
                };
              }
            }, 50);
          };
        }

        C.querySelectorAll('.cs .bo[data-key]:not(.rm-stu-btn), .cs .bp[data-key]:not(.rm-stu-btn)').forEach(b => {
          if (b.textContent === 'Save' || b.textContent === 'Save COND') b.onclick = () => saveGrade(b.dataset.key);
        });
        C.querySelectorAll('.cs .rm-stu-btn').forEach(b => {
          b.onclick = () => removeStudent(b.dataset.key);
        });

        C.querySelectorAll('.cs .bda[data-key]').forEach(b => { if (!b.disabled) b.onclick = () => confirmSeal(b.dataset.key); });
        C.querySelectorAll('.gi').forEach(inp => inp.oninput = () => { const c = inp.dataset.key; if (!DRAFTS[c]) DRAFTS[c] = { g: '', ov: '' }; DRAFTS[c].g = inp.value; });
        C.querySelectorAll('.gv').forEach(sel2 => sel2.onchange = () => { const c = sel2.dataset.key; if (!DRAFTS[c]) DRAFTS[c] = { g: '', ov: '' }; DRAFTS[c].ov = sel2.value; });

        C.querySelectorAll('.cs .cond-btn[data-key]').forEach(b => {
          b.onclick = () => {
             const key = b.dataset.key;
             modal({
                title: 'Conditional Override (COND)',
                sub: 'Create temporary grading entry for pre-requisite bypassing or data migration.',
                accent: '#d97706',
                body: `<input id="creason" class="inp" placeholder="Reason (e.g., Paper Migration)..." style="width:100%"/>`,
                btns: [
                   { label: 'Unlock Row', cls: 'bp', fn: () => {
                       const r = document.getElementById('creason').value.trim();
                       if(!r) return toast('Reason required.', 'error');
                       closeModal();
                       if (!DRAFTS[key]) DRAFTS[key] = { g: '', ov: 'COND' };
                       DRAFTS[key].condUnlocked = true;
                       DRAFTS[key].condReason = r;
                       DRAFTS[key].ov = 'COND';
                       drawTable();
                   }},
                   { label: 'Cancel', cls: 'bo', fn: closeModal }
                ]
             });
          };
        });
        tableDrawn = true;
      }

      db.collection('users').where('role', '==', 'student').get().then(snap => {
        globalStudents = [];
        snap.forEach(d => { if (d.data().isDeleted === false) globalStudents.push({ ...d.data(), _id: d.id }); });
        globalStudents.sort((a, b) => a.full_name.localeCompare(b.full_name));

        // Fetch My Classes (Advisee mode)
        db.collection('classes').where('instructor_uid', '==', S.user.uid).get().then(clsSnap => {
          myClasses = [];
          clsSnap.forEach(d => myClasses.push({ ...d.data(), _id: d.id }));
          myClasses.sort((a, b) => a.subject_code.localeCompare(b.subject_code));

          if (viewMode === 'classes' && !selClass && myClasses.length > 0) {
            selClass = myClasses[0];
            S.gradeSelClass = selClass;
          }

          LIVE = {}; tableDrawn = false;
          startRecListener();
        });
      }).catch(() => { });
    }

    // ═══════════════════════════════════════════════════════════
    //  ANNOUNCEMENTS TAB (Global)
    // ═══════════════════════════════════════════════════════════
    function pgAnnounce(C) {
      const isAdminOrDean = (S.doc.role === 'admin' || S.doc.role === 'dean');

      const unsub = db.collection('announcements').orderBy('timestamp', 'desc').onSnapshot(snap => {
        let anns = [];
        snap.forEach(d => anns.push({ ...d.data(), _id: d.id }));

        let html = `<div class="pg up">
        <div class="ph"><span class="stg">Campus Updates</span><div class="pt">Announcements</div></div>`;

        if (isAdminOrDean) {
          html += `
          <div class="card cp" style="margin-bottom:24px">
             <div class="sti" style="margin-bottom:12px">Post New Announcement</div>
             <div class="ig">
                <textarea id="annInput" class="inp" placeholder="Type your announcement here... e.g. Enrollment for Year 2 is now open!"></textarea>
             </div>
             <button class="btn bp" id="postAnnBtn">Post Announcement</button>
          </div>`;
        }

        if (anns.length === 0) {
          html += `<div class="card cp emp"><div style="display:flex;justify-content:center;margin-bottom:16px;color:var(--ink4)">${ICONS.bell}</div><div class="sti">No announcement for now</div><div style="font-size:14px;color:var(--ink3);margin-top:8px">Please stay tuned for updates.</div></div>`;
        } else {
          html += `<div style="display:flex;flex-direction:column;gap:16px;">`;
          anns.forEach(a => {
            html += `
              <div class="card cp" style="border-left:4px solid var(--sage);">
                 <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
                    <div style="font-weight:700;color:var(--ink)">${esc(a.author_name)} <span class="bdg bsg" style="margin-left:8px">${esc(a.author_role)}</span></div>
                    <div style="font-size:11px;color:var(--ink4)">${fmtD(a.timestamp)}</div>
                 </div>
                 <div style="font-size:14px;color:var(--ink2);line-height:1.7;white-space:pre-wrap;">${esc(a.message)}</div>
                 ${isAdminOrDean ? `<div style="text-align:right;margin-top:12px"><button class="btn bo bxs" onclick="deleteAnn('${a._id}')">${ICONS.x} Delete</button></div>` : ''}
              </div>`;
          });
          html += `</div>`;
        }

        html += `</div>`;
        C.innerHTML = html;

        if (isAdminOrDean) {
          const btn = document.getElementById('postAnnBtn');
          if (btn) {
            btn.onclick = async () => {
              const msg = document.getElementById('annInput').value.trim();
              if (!msg) return;
              btn.disabled = true; btn.innerHTML = `<span class="spns"></span>`;
              try {
                await db.collection('announcements').add({
                  message: msg, author_name: S.doc.full_name, author_role: S.doc.role, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                toast('Announcement posted.', 'success');
              } catch (e) { toast(e.message, 'error'); }
            };
          }
        }
      });
      LISTENERS.add(unsub);
    }
    window.deleteAnn = async function (id) {
      if (!confirm("Delete this announcement?")) return;
      try { await db.collection('announcements').doc(id).delete(); toast('Deleted.', 'warning'); } catch (e) { }
    }

    //  ACCOUNT CREATION (Admin/Dean only)

    function pgCreate(C) {
      const pw0 = genPw();
      const isAdmin = S.doc.role === 'admin';
      C.innerHTML = `<div class="pg up">
      <div class="ph"><span class="stg">Access Management</span><div class="pt">Account Creation</div></div>
      <div class="card cp">
        <span class="stg">Add User</span>
        <div class="ir c2" style="margin-top:12px">

          <div><label class="fl">Temp Password</label><div style="display:flex;gap:8px"><input class="inp" id="ap" type="text" value="${esc(pw0)}" style="font-family:monospace;font-weight:700;color:var(--saged)"/><button class="btn bo bsm" id="arn" style="flex-shrink:0;padding:0 12px">🔀</button></div></div>
        </div>
        <div class="ir c2">

          <button class="btn bpe" id="aaddbtn" style="align-self:end;height:46px;border-radius:12px;font-size:14px">Create Account</button>
        </div>
      </div>
   </div>`;

      const ar = document.getElementById('arn'); if (ar) ar.onclick = () => { document.getElementById('ap').value = genPw(); };
      const aAdd = document.getElementById('aaddbtn'); if (aAdd) aAdd.onclick = async () => {
        const name = (document.getElementById('an').value || '').trim();
        const idNum = (document.getElementById('ai').value || '').trim().toUpperCase();
        const email = `${idNum}${PSEUDO_DOMAIN}`.toLowerCase();
        const pw = document.getElementById('ap').value;
        const role = document.getElementById('ar').value;
        if (!name || !idNum) { toast('Fill in Name and ID Number.', 'error'); return; }
        if (pw.length < 6) { toast('Password must be at least 6 characters.', 'error'); return; }
        if (role === 'admin' && !isAdmin) { toast('Permission Denied.', 'error'); return; }

        const btn = document.getElementById('aaddbtn');
        btn.disabled = true; btn.innerHTML = `<span class="spns"></span>&nbsp;Creating…`;
        try {
          const newUser = await createFirebaseUser(email, pw);
          await db.collection('users').doc(newUser.uid).set({
            uid: newUser.uid, email, full_name: name, id_number: idNum, role,
            temp_pw: pw, year_level: 1, current_term: 1, section: '', instructor_id: '',
            isActive: true, isDeleted: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          ['an', 'ai'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
          const apEl = document.getElementById('ap'); if (apEl) apEl.value = genPw();
          btn.disabled = false; btn.textContent = 'Create Account';
          toast(`<strong>${esc(name)}</strong> created! Temp PW: <strong>${esc(pw)}</strong>`, 'success', 8000);
        } catch (e) {
          btn.disabled = false; btn.textContent = 'Create Account';
          toast(eMsg(e.code, e.message), 'error', 8000);
        }
      };

    // ═══════════════════════════════════════════════════════════
    //  ADMIN / DEAN — OVERVIEW & DEADLINE 
    // ═══════════════════════════════════════════════════════════
    function pgOverview(C) {
      const isAdmin = (S.doc && S.doc.role === 'admin');
      const isDean = (S.doc && S.doc.role === 'dean');
      const isPastDeadline = S.config && S.config.deadline && Date.now() > S.config.deadline;

      overviewCharts.forEach(c => { try { c.destroy(); } catch (e) { } });
      overviewCharts = [];

      let sysErrLogs = [];
      let errLogUnsub = null;
      if (isAdmin && db) {
        errLogUnsub = db.collection('system_errors').orderBy('time', 'desc').limit(15).onSnapshot(snap => {
          sysErrLogs = snap.docs.map(d => d.data());
          const el = document.getElementById('errorLogConsole');
          if (el) {
            el.innerHTML = sysErrLogs.length === 0 ? '<div style="color:var(--ink4)">No system errors logged.</div>'
              : sysErrLogs.map(r => `<div style="border-bottom:1px dashed var(--bd);padding-bottom:6px;margin-bottom:6px"><span style="color:var(--ink4)">[${new Date(r.time).toLocaleTimeString()}]</span> <span style="color:var(--rose)">ERR:</span> <span style="color:var(--ink2)">${esc(r.msg)}</span> (User: ${esc(r.user)})</div>`).join('');
          }
        });
        LISTENERS.add(errLogUnsub);
      }

      const unsub = db.collection('academic_records').onSnapshot(async rSnap => {
        try {
          overviewCharts.forEach(c => { try { c.destroy(); } catch (e) { } });
          overviewCharts = [];
          const uSnap = await db.collection('users').get();
          const users = [], recs = [];
          uSnap.forEach(d => { if (d.data().isDeleted === false) users.push(d.data()); });
          rSnap.forEach(d => { if (d.data().isDeleted === false) recs.push(d.data()); });
          const recent = [...recs].sort((a, b) => ((b.lastUpdated && b.lastUpdated.seconds) ? b.lastUpdated.seconds : 0) - ((a.lastUpdated && a.lastUpdated.seconds) ? a.lastUpdated.seconds : 0)).slice(0, 5);

    window.removeUser = function (id, name) {
      modal({
        title: 'Remove User?', body: `<div class="ib ibrs" style="padding:16px"><span>${ICONS.warn}</span><div>Soft delete user. Cannot be undone locally.</div></div>`, btns: [{
          label: 'Remove', cls: 'bda', fn: async () => {
            closeModal();
            try {
              const rs = await db.collection('academic_records').where('student_uid', '==', id).get();
              const es = await db.collection('enrollments').where('student_uid', '==', id).get();
              const batch = db.batch();
              rs.forEach(d => batch.update(d.ref, { isDeleted: true }));
              es.forEach(d => batch.delete(d.ref));
              batch.update(db.collection('users').doc(id), { isDeleted: true });
              await batch.commit();
              toast('User and associated records removed.', 'warning');
            } catch (e) { toast(e.message, 'error'); }
          }
        }, { label: 'Cancel', cls: 'bo', fn: closeModal }]
      });

        C.innerHTML = `<div class="pg up">
